services:
  # --- APP ---
  - type: web
    name: laravel-app
    env: docker
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      cp .env.example .env
      php artisan key:generate
    startCommand: |
      php artisan migrate --force || true
      php artisan serve --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://laravel-app.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService: mysql
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: laravel
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: root

  # --- MYSQL ---
  - type: pserv
    name: mysql
    env: docker
    image: mysql:8.0
    plan: free
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root
      - key: MYSQL_DATABASE
        value: laravel
      - key: MYSQL_USER
        value: laravel
      - key: MYSQL_PASSWORD
        value: laravel
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # --- REDIS (opcional, si lo usás con queue/cache) ---
  - type: pserv
    name: redis
    env: docker
    image: redis:7
    plan: free
